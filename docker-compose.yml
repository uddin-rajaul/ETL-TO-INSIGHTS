services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: etl_insights
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d etl_insights"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/etl-raw &&
        mc mirror --overwrite /csvs local/etl-raw &&
        echo 'MinIO bucket and CSVs ready.'
      "
    volumes:
      - ./data/raw:/csvs:ro

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./visualizations/output:/app/visualizations/output
    entrypoint: ["/app/entrypoint.sh"]

volumes:
  postgres_data:
  minio_data:
